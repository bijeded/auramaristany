schema: spec-driven

context: |
  Aura Maristany — health coaching platform (women 40+). Sells programs as recurring
  monthly subscriptions.
  Stack: Next.js 14 App Router + TypeScript, Supabase (PostgreSQL + RLS + Auth + Storage),
  Stripe (MXN, apiVersion 2026-05-27.dahlia), Tailwind + shadcn/ui, Tiptap, Resend, Recharts,
  dnd-kit, zod, Vitest. Deploy on Vercel; DB on Supabase Cloud.
  Conventions: neutral Mexican Spanish in the UI ('cliente', not 'clienta'); pure functions
  (with tests, AAA pattern) kept separate from server-only queries; Server Components by
  default, mutations via server actions; RLS is the security boundary, service-role only
  after requireAdmin(); identity always from getUser(); validate input with zod + sanitize-html;
  Conventional Commits.
  Migrations: numbered SQL in supabase/migrations/ (001-010 applied); never edit an applied
  one, add a new one. months_elapsed is the immutable arbiter of access (incremented by
  invoice.paid, never computed from dates).
  Deployment restriction: main = Production for the live demo (app.auramaristany.com) that
  Aura sees; WIP goes on branches/Preview. See CLAUDE.md, SPEC.md, and handoff.md for details.

