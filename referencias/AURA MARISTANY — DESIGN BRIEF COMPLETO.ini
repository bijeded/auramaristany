  Sitio WordPress (quiz) → /checkout/[programa] → /auth/register
  → /auth/login → /onboarding/questionnaire → /portal/today

PORTAL CLIENTE (bottom tab navigation en mobile):
  🏠 Hoy (/portal/today)
  📊 Mi Progreso (/portal/history)
  💬 Mensajes (/portal/messages)
  ⚙️  Mi Cuenta (/portal/settings)

PANEL ADMIN (sidebar navigation):
  📊 Dashboard (/admin/dashboard)
  👥 Clientes (/admin/clients)
  📚 Contenido (/admin/content)
  💬 Mensajes (/admin/messages)
  📋 Onboarding (/admin/onboarding-settings)

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PANTALLA 1 — CHECKOUT / LANDING DE PROGRAMA
Ruta: /checkout/[variantSlug]
Usuario: Pública (viene del quiz de WordPress)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Propósito: Convencer a la clienta de completar su suscripción al programa
que el quiz de WordPress le asignó. Es la primera impresión de la app.

Layout: Una sola columna centrada, máximo 480px de ancho, fondo #eddbd8 muy
sutil como fondo de página.

Secciones (de arriba hacia abajo):

[HEADER]
  - Logo de Aura Maristany centrado, en negro
  - Sin navegación adicional (página de enfoque total en la conversión)

[HERO DEL PROGRAMA]
  - Nombre del programa en Oswald grande: ej. "CuarentaMás"
  - Subtítulo en Hind: ej. "Nivel Principiante · Hasta 45 minutos por día"
  - Fotografía lifestyle (mujer 40+ activa, cálida, auténtica) — imagen full-width
    con overlay sutil de gradiente

[CARD DE RESUMEN]
  Fondo blanco, bordes redondeados, sombra suave.
  - Ícono de calendario + "Programa de 6 meses"
  - Ícono de peso + El nivel y variante asignada
  - Ícono de check + "Ejercicios + Alimentación + Bienestar"
  - Ícono de lock + "Acceso nuevo cada día"
  - Precio: texto grande en Oswald "MX$XXX / mes"
  - Texto pequeño: "Facturación mensual · Cancela cuando quieras"

[TESTIMONIAL] (opcional, una sola frase corta)
  Cita de clienta + nombre + foto circular avatar
  Fondo #eddbd8, bordes redondeados

[CTA]
  Botón grande full-width: "Comenzar ahora" (fondo #9982f4, texto blanco, Oswald)
  Texto debajo del botón en gris pequeño: "Serás redirigida a una página segura
  de pago. Regresarás aquí para completar tu registro."

[FOOTER MÍNIMO]
  "© Aura Maristany · Términos · Privacidad"

Estados:
  - Estado normal (como descrito)
  - Estado de error: Si la clienta intenta acceder sin haber completado
    el prerequisito (ej. quiere Extra sin haber terminado CuarentaMás),
    mostrar card de error con fondo #e05c5c/10, ícono de lock, mensaje
    explicativo y botón "Ver mis programas activos"

