PANTALLA 2 — LOGIN
Ruta: /auth/login
Usuario: Pública
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Layout: Centrado verticalmente en pantalla, máximo 400px de ancho.
Fondo de página: #eddbd8 muy sutil o blanco puro.

Secciones:

[LOGO]
  Logo Aura Maristany centrado, tamaño mediano

[CARD DE LOGIN]
  Fondo blanco, sombra suave, padding 32px, border-radius 16px.

  Título: "Bienvenida de vuelta" (Oswald, negro, centrado)
  Subtítulo: "Ingresa con tu correo electrónico" (Hind, gris)

  Formulario:
  - Input: Correo electrónico (label flotante, ícono de sobre)
  - Input: Contraseña (label flotante, ícono de candado, toggle para mostrar/ocultar)
  - Link derecha: "¿Olvidaste tu contraseña?"
  - Botón primario full-width: "Ingresar"

  Separador: "— o —"

  Link: "¿No tienes cuenta? Regístrate aquí"

[ESTADO DE ERROR]
  Debajo del formulario, banner rojo claro con mensaje de error específico:
  "Correo o contraseña incorrectos. Intenta de nuevo."

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PANTALLA 3 — REGISTRO
Ruta: /auth/register
Usuario: Pública (viene de /checkout después del pago exitoso)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Layout: Igual que login. Card centrada, 400px máximo.

Secciones:

[LOGO]
  Logo centrado

[CARD DE REGISTRO]
  Título: "Crea tu cuenta" (Oswald)
  Subtítulo: "Para acceder a tu programa de Aura" (Hind, gris)

  Formulario:
  - Input: Nombre completo
  - Input: Correo electrónico
  - Input: Contraseña (con requisitos: 8+ caracteres)
  - Input: Confirmar contraseña
  - Checkbox: "Acepto los Términos y Condiciones y la Política de Privacidad"
    (texto con links subrayados)
  - Botón primario full-width: "Crear mi cuenta"

  Link al fondo: "¿Ya tienes cuenta? Inicia sesión"

[ESTADO DE ÉXITO]
  Después de registro exitoso, mostrar pantalla de confirmación:
  - Ícono de sobre grande con animación suave
  - "¡Ya casi! Revisa tu correo"
  - "Te enviamos un enlace de confirmación a [correo]. Haz clic en
    él para activar tu cuenta y continuar."
  - Botón secundario: "Reenviar correo"

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PANTALLA 4 — RECUPERAR CONTRASEÑA
Ruta: /auth/reset-password
Usuario: Pública
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Layout: Card centrada, 400px máximo.

[PASO 1 — SOLICITAR RESET]
  Título: "¿Olvidaste tu contraseña?" (Oswald)
  Subtítulo: "Ingresa tu correo y te enviaremos un enlace para restablecerla"
  - Input: Correo electrónico
  - Botón primario: "Enviar enlace"
  - Link: "← Volver al inicio de sesión"

[PASO 2 — CONFIRMACIÓN]
  - Ícono de sobre + check verde
  - "Revisa tu correo"
  - "Si existe una cuenta con ese correo, recibirás instrucciones en
    los próximos minutos."

[PASO 3 — NUEVA CONTRASEÑA] (pantalla diferente, desde el link del email)
  Título: "Crea una nueva contraseña"
  - Input: Nueva contraseña
  - Input: Confirmar nueva contraseña
  - Botón primario: "Guardar contraseña"

