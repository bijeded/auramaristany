NOTAS GENERALES PARA EL DISEÑO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

MOBILE-FIRST:
  - Todas las pantallas del portal de cliente se diseñan primero
    para 375px de ancho (iPhone SE/14)
  - El admin puede asumir desktop como primario (1280px) pero debe
    ser usable en tablet (768px)

ESTADOS QUE DEBEN EXISTIR EN CADA PANTALLA:
  1. Estado normal (datos cargados)
  2. Estado de carga (skeleton loaders — no spinners)
  3. Estado vacío (cuando no hay datos aún)
  4. Estado de error (cuando algo falla)

SKELETON LOADERS (en lugar de spinners):
  Rectángulos grises animados (shimmer) del mismo tamaño que el
  contenido que van a reemplazar. Nunca mostrar un spinner solo
  en el centro de la pantalla.

ACCESIBILIDAD:
  - Contraste mínimo 4.5:1 para texto
  - Todos los inputs tienen labels visibles (no solo placeholders)
  - Áreas táctiles mínimo 44×44px
  - El botón de guardado en /portal/today es sticky (siempre visible
    al hacer scroll)

TRANSICIONES:
  - Transiciones suaves (200-300ms ease) entre estados
  - Animación de check al marcar ejercicios completados
  - Toasts de confirmación (2-3 segundos) para acciones exitosas:
    aparecen en la parte superior, fondo #4caf7d oscuro, texto blanco

TONO DEL COPY EN LA UI:
  - Warm, encouraging, first-person para la clienta:
    "Tu progreso", "Mi programa", "Mis medidas"
  - Sin tecnicismos
  - Mensajes de éxito celebran, no son fríos:
    "¡Guardado! Sigue así 💜" no "Operación completada"
