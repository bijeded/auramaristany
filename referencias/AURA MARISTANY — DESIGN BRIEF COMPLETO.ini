PANTALLA 5 — ONBOARDING / CUESTIONARIO
Ruta: /onboarding/questionnaire
Usuario: Cliente (solo al primer acceso, post-pago)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Propósito: Recopilar información relevante de la clienta para Aura
antes de que acceda a su programa. Tono cálido, no médico.

Layout: Una pregunta por pantalla (wizard), con barra de progreso en la parte superior.
Máximo 480px de ancho, centrado.

Estructura:

[BARRA DE PROGRESO]
  Barra lineal en la parte superior: "Pregunta 3 de 8"
  Fondo #eddbd8, fill #9982f4

[PANTALLA DE BIENVENIDA] (primera pantalla del wizard)
  - Foto circular de Aura Maristany (o ilustración cálida)
  - Título: "¡Hola! Soy Aura" (Oswald grande)
  - Párrafo: "Antes de comenzar, necesito conocerte un poco mejor
    para poder acompañarte de la mejor manera posible. Son solo
    unos minutos."
  - Botón: "Comenzar →"

[PANTALLA DE PREGUNTA — TIPO SELECCIÓN ÚNICA]
  - Número de pregunta pequeño arriba: "3 de 8"
  - Pregunta en Oswald mediano: "¿Cuál es tu principal objetivo
    al unirte a este programa?"
  - Opciones como cards seleccionables (una a la vez):
    Cada opción: fondo blanco, borde gris. Al seleccionar: borde #9982f4,
    fondo #9982f4/10, check de color en la esquina superior derecha.
    Ejemplos de opciones:
    □ "Perder peso"
    □ "Ganar fuerza y tono muscular"
    □ "Tener más energía"
    □ "Mejorar mi salud general"
  - Botón: "Siguiente →" (deshabilitado hasta seleccionar algo)

[PANTALLA DE PREGUNTA — TIPO SELECCIÓN MÚLTIPLE]
  Igual que selección única pero permite marcar varias opciones.
  Leyenda pequeña debajo de la pregunta: "Puedes elegir varias opciones"

[PANTALLA DE PREGUNTA — TIPO NÚMERO]
  - Pregunta: "¿Cuántos años tienes?"
  - Input numérico grande, centrado, con unidad al lado: "años"
  - Sin teclado qwerty — solo teclado numérico en mobile

[PANTALLA DE PREGUNTA — TIPO TEXTO LIBRE]
  - Pregunta: "¿Hay algo más que quieras que Aura sepa sobre ti?"
  - Textarea grande con placeholder: "Escribe aquí lo que quieras compartir
    (lesiones, miedos, metas, lo que sea)..."
  - Texto debajo: "Esta respuesta es opcional"

[PANTALLA FINAL]
  - Ícono de corazón o estrella animado
  - Título: "¡Todo listo!" (Oswald grande)
  - "Aura revisará tus respuestas para personalizar tu acompañamiento.
    Tu programa comienza hoy."
  - Botón grande: "Ver mi programa de hoy →"

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PANTALLA 6 — PORTAL CLIENTE: HOY (página principal)
Ruta: /portal/today
Usuario: Cliente con suscripción activa
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Propósito: La pantalla más importante de toda la app. La clienta
la abre cada vez que va a entrenar. Muestra el contenido del día
y permite registrar su progreso SIN salir de esta pantalla.

Layout mobile: scroll vertical, sin tabs internos, una sola página continua.
Bottom tab navigation permanente en la parte inferior.

Secciones (de arriba hacia abajo):

[TOP BAR]
  - Izquierda: Logo o nombre "Aura" pequeño
  - Centro: Fecha de hoy (Hind, gris): "Miércoles, 3 de junio"
  - Derecha: Avatar circular de la clienta (foto o iniciales)

[BANNER DE PROGRESO DEL PROGRAMA]
  Card horizontal con fondo #eddbd8, border-radius 12px.
  - Izquierda: "Día 12 de 180" en Oswald mediano
  - Barra de progreso lineal debajo (fill #9982f4, track #eddbd8 oscuro)
  - Derecha: badge con el nombre del programa y nivel
    Ejemplo: "CuarentaMás · Principiante"

[TÍTULO DEL DÍA]
  - Nombre del día en Oswald grande: "Piernas y Glúteos"
  - Tag de tipo: "💪 Entrenamiento" o "😴 Descanso activo" o "📊 Evaluación"
  - Duración estimada: "⏱ 40 minutos"

[BLOQUES DE CONTENIDO — renderizados en orden]
  Cada bloque ocupa el ancho completo, sin card contenedora visual
  (fluyen como una página de contenido editorial).

  BLOQUE TIPO: TEXTO ENRIQUECIDO
    Párrafos con formato: bold, listas con bullets, encabezados H3.
    Fuente Hind, tamaño legible (16px mínimo), line-height generoso.

  BLOQUE TIPO: VIDEO YOUTUBE
    Card con border-radius 12px, overflow hidden.
    - Estado inicial: Thumbnail del video (imagen completa) con botón de
      play superpuesto en el centro (círculo blanco/semitransparente
      con triángulo de play en #9982f4). SIN mostrar controles de YouTube.
    - Al hacer tap/click en el play: carga el iframe de YouTube.
      El iframe usa parámetros: rel=0, modestbranding=1, iv_load_policy=3
      para minimizar elementos de YouTube.
    - Título del video en Hind pequeño debajo de la miniatura: ej.
      "Calentamiento — 8 minutos"

  BLOQUE TIPO: IMAGEN
    Imagen full-width con border-radius 12px.
    Alt text o caption en Hind pequeño gris debajo.

  BLOQUE TIPO: PDF ADJUNTO
    Card horizontal con fondo #f5f5f5, borde sutil.
    - Ícono de PDF (rojo) a la izquierda
    - Nombre del archivo en Hind: "Plan de alimentación — Día 12"
    - Botón derecha: "Abrir" (texto #9982f4)
    Al tocar: abre el PDF en una nueva pestaña o modal.

  BLOQUE TIPO: LISTA DE EJERCICIOS ← más importante
    Card contenedora con borde #eddbd8 y fondo blanco.
    Header de la card: "Ejercicios de hoy" en Oswald.

    Por cada ejercicio en la lista:
    ┌─────────────────────────────────────────────┐
    │ ☐  Sentadilla con mancuerna                 │
    │    3 series × 12 reps · Descanso: 60 seg    │
    │    Notas de Aura: Rodillas alineadas         │
    │                                             │
    │    Mis reps completadas:  [____]            │
    │    Peso usado (kg):       [____]            │
    │    Mis notas:             [________________]│
    └─────────────────────────────────────────────┘

    - El checkbox redondo a la izquierda: vacío = pendiente,
      marcado = fill #9982f4 con check blanco
    - Al marcar el checkbox, la fila completa del ejercicio
      se atenúa ligeramente (opacity 0.6) y el nombre del ejercicio
      muestra un tachado
    - Los campos de texto son opcionales (la clienta puede
      solo marcar el check sin llenar nada)
    - Inputs numéricos pequeños e inline (no modales)
    - Separador sutil entre ejercicios (línea gris muy clara)
    - Si todos los ejercicios están marcados: banner de
      celebración suave al final: "¡Excelente trabajo hoy! 🎉"

[CAMPO DE NOTAS GENERALES]
  Área de texto opcional, fondo #f5f5f5:
  Label: "Mis notas de hoy (opcional)"
  Placeholder: "¿Cómo te sentiste? ¿Algo que quieras recordar?"

[BOTÓN DE GUARDADO]
  Botón primario full-width, pegajoso al fondo (sticky bottom):
  "Guardar mi progreso de hoy"
  - Estado normal: fondo #9982f4
  - Estado guardado: fondo #4caf7d + texto "✓ Progreso guardado"
    (auto-guardado con debounce de 2 segundos después de cada cambio)
  - Si ya está todo guardado, el botón dice "✓ Progreso del día guardado"
    en verde y es menos prominente visualmente

[ESTADOS ESPECIALES DE ESTA PANTALLA]

  ESTADO: DÍA DE DESCANSO
    En lugar de ejercicios, mostrar:
    Card suave con fondo #eddbd8, ícono de luna o corazón.
    "Hoy es día de descanso 💙"
    Texto de Aura con recomendaciones de recuperación.
    NO mostrar campos de progreso de ejercicios.
    Sí mostrar campo de notas generales (opcional).

  ESTADO: CONTENIDO AÚN NO DISPONIBLE
    (Si la clienta abre la app por primera vez y el contenido del día
    no ha sido publicado por Aura aún)
    Card con ícono de reloj:
    "El contenido de hoy estará disponible pronto.
     Aura está preparando tu programa. 💜"

  ESTADO: SUSCRIPCIÓN VENCIDA / PAST_DUE
    Banner rojo claro al TOP de la pantalla:
    "⚠️ Hubo un problema con tu pago. Actualiza tu método de pago
     para continuar."  [Actualizar →]
    El contenido del día aún se muestra pero con overlay semitransparente.

[BOTTOM TAB NAVIGATION]
  4 tabs fijos al fondo:
  🏠 Hoy | 📊 Progreso | 💬 Mensajes (badge rojo si hay no leídos) | ⚙️ Mi Cuenta
  Tab activo: ícono + texto en #9982f4, línea indicadora arriba.
  Tabs inactivos: gris.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PANTALLA 7 — PORTAL CLIENTE: MI PROGRESO / HISTORIAL
Ruta: /portal/history
Usuario: Cliente
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Propósito: La clienta ve su evolución física a lo largo del tiempo
con gráficas de métricas corporales y galería de fotos de progreso.
También puede registrar nuevas medidas aquí.

Layout: Scroll vertical. Tabs internos en la parte superior para
cambiar entre "Métricas" y "Fotos".

[TOP BAR]
  Título: "Mi Progreso" (Oswald)
  Botón derecha: "+ Registrar medidas" (texto #9982f4)

[TABS INTERNOS]
  [ Métricas | Fotos ]
  Tab activo: underline #9982f4, texto negro.
  Tab inactivo: texto gris.

TAB 1 — MÉTRICAS:

  [BOTÓN "+ REGISTRAR MEDIDAS"] — si no tiene registro de hoy
    Card punteada con borde #9982f4, fondo #9982f4/5.
    "+ Agregar medidas de hoy"
    Al tocar: drawer/modal desde abajo con el formulario:

    MODAL / DRAWER "REGISTRAR MEDIDAS"
      Título: "Medidas de hoy" + fecha
      - Input: Peso (kg) — teclado numérico
      - Input: Cintura (cm)
      - Input: Cadera (cm)
      - Textarea: Notas (opcional)
      - Sección "Fotos de progreso" (opcional):
        3 botones de cámara etiquetados: "Frente", "Lado", "Espalda"
        Al tocar cada uno: abre cámara/galería del celular
        Previsualización cuadrada de la foto con botón "×" para eliminar
      - Botón: "Guardar medidas"

  [GRÁFICAS DE PROGRESO]
    Selector de métrica: [ Peso | Cintura | Cadera ]
    Pills/chips seleccionables, activo con fondo #9982f4 y texto blanco.

    Gráfica de línea (Recharts):
    - Fondo blanco, bordes redondeados, sombra suave
    - Línea en color #9982f4, grosor 2px
    - Puntos en cada medición: círculo sólido #9982f4
    - Al tocar un punto: tooltip con valor + fecha
    - Área bajo la línea: fill #9982f4 con opacity 10%
    - Eje X: fechas (solo las que tienen datos)
    - Eje Y: sin etiquetas visibles (se ve en el tooltip)
    - Si hay datos insuficientes (< 2 mediciones): placeholder con texto
      "Registra al menos 2 medidas para ver tu gráfica de progreso"

    Selector de período: [ 1 mes | 3 meses | 6 meses | Todo ]
    Chips de filtro en gris claro, activo en negro.

  [RESUMEN NUMÉRICO]
    3 cards horizontales en fila (o 1 columna en mobile muy pequeño):
    Cada card muestra:
    - Métrica: "Peso"
    - Valor inicial: "72 kg" (pequeño, gris)
    - Valor actual: "68.5 kg" (grande, negro, Oswald)
    - Cambio: "−3.5 kg" (badge verde si bajó, rojo si subió — para peso;
      lógica inversa puede no aplicar siempre, solo mostrar el delta)

  [HISTORIAL DE REGISTROS]
    Lista de registros ordenados por fecha (más reciente primero).
    Por cada registro:
    Card compacta con:
    - Fecha izquierda (Hind, negro)
    - Métricas: "68.5 kg · 72 cm · 96 cm" (Hind, gris)
    - Ícono de cámara si tiene fotos (derecha), al tocar va a esa entrada

TAB 2 — FOTOS:

  [GALERÍA DE FOTOS]
    Grid de 3 columnas con miniaturas cuadradas, border-radius 8px.
    Sobre cada miniatura: fecha pequeña.
    Al tocar una foto: modal de visualización full-screen
    - Muestra la foto grande
    - Flechas para navegar entre fotos del mismo registro
    - Información: fecha, ángulo (Frente / Lado / Espalda)
    - Botón "×" para cerrar

  [FILTROS]
    Fila horizontal scrollable: [ Todas | Frente | Lado | Espalda ]

  [ESTADO VACÍO]
    Ilustración sutil + texto: "Aún no tienes fotos de progreso.
    Empieza hoy registrando tu primera foto."
    Botón: "+ Agregar foto"

