Propósito: Aura crea y edita el contenido completo de un día de
entrenamiento. Es su herramienta de trabajo principal.

Layout: 2 columnas en desktop (60% editor, 40% preview).
En mobile: 1 columna, con botón de "Preview" que alterna vistas.

[TOP BAR DEL EDITOR]
  ← "Serie 1" | "Día 12"
  Indicador de estado: badge "Borrador" (gris) o "Publicado" (verde)
  Botones derecha:
  - "Guardar" (secundario, auto-guarda también con debounce)
  - "Publicar" (primario #9982f4) — o "Despublicar" si ya está publicado
  - "Preview" (solo visible en mobile)

[CAMPOS BÁSICOS]
  - Input: Título del día (ej. "Piernas y Glúteos") — Oswald en el input
  - Selector tipo de día: 3 opciones en pills:
    [💪 Entrenamiento] [😴 Descanso] [📊 Evaluación]
  - Input numérico: "Duración estimada (minutos)"

[ÁREA DE BLOQUES — CANVAS]
  Lista ordenada de bloques de contenido.
  Cada bloque tiene:
  - Handle de drag izquierda (≡ ícono) para reordenar
  - Tipo de bloque en gris pequeño en la esquina superior
  - Contenido editable del bloque
  - Botón "✕" para eliminar el bloque (derecha superior)

  BLOQUE TIPO TEXTO:
    Editor Tiptap full-width en el canvas.
    Toolbar: B | I | H2 | H3 | Lista | Lista numerada
    (toolbar aparece al seleccionar texto o al hacer focus)
    Placeholder: "Escribe las instrucciones del día..."

  BLOQUE TIPO YOUTUBE:
    - Input de URL de YouTube (con validación visual)
    - Al pegar URL válida: preview del thumbnail automático
      con el título del video
    - Input para título personalizado (opcional): "Calentamiento - 8 min"
    - Si URL inválida: mensaje de error inline

  BLOQUE TIPO PDF:
    - Área de drag & drop: "Arrastra tu PDF aquí o haz clic para seleccionar"
    - Si PDF subido: ícono de PDF + nombre del archivo + tamaño
      + botón "✕" para eliminar
    - Input: Etiqueta del PDF (ej. "Plan de alimentación día 12")
    - Indicador de carga durante el upload

  BLOQUE TIPO IMAGEN:
    - Área de drag & drop (igual que PDF pero para imágenes)
    - Preview de la imagen una vez subida
    - Input: Alt text / descripción de la imagen
    - Botón "Cambiar imagen"

  BLOQUE TIPO LISTA DE EJERCICIOS:
    Header del bloque: "Lista de ejercicios"
    Por cada ejercicio en la lista:
    ┌──────────────────────────────────────────────────────┐
    │ ≡  Ejercicio 1                                   [✕] │
    │ Nombre: [Sentadilla con mancuerna          ]         │
    │ Series × Reps: [3] × [12]  Descanso: [60] seg       │
    │ Notas: [Rodillas alineadas con pies        ]         │
    │ Métricas que registrará la clienta:                  │
    │ ☑ Reps completadas  ☑ Peso usado (kg)  ☐ Tiempo      │
    └──────────────────────────────────────────────────────┘
    Botón al fondo: "+ Agregar ejercicio"
    Los ejercicios son arrastrables dentro del bloque.

[PALETA DE BLOQUES — barra lateral o botón flotante]
  En desktop: columna derecha fija con botones para insertar bloques.
  En mobile: botón "+" flotante que abre un menú.

  Botones de inserción:
  [T] Texto        [▶] Video YouTube
  [📎] PDF         [🖼] Imagen
  [💪] Ejercicios

  Cada botón: ícono + etiqueta, fondo blanco, borde sutil.
  Al hacer clic: agrega el bloque al final del canvas y hace scroll.

[PANEL DE PREVIEW] (columna derecha en desktop, vista alternada en mobile)
  Preview en tiempo real de cómo se verá en el portal de la clienta.
  Fondo gris claro para simular el fondo de la app.
  En el centro: frame de celular (mockup) o simplemente la vista renderizada.

[ESTADOS]
  - Auto-guardado: indicador sutil en el top bar: "Guardado hace 5 seg"
  - Error al guardar: banner rojo claro al top: "Error al guardar. Intenta de nuevo."
  - Sin cambios: "Todo guardado" en gris

