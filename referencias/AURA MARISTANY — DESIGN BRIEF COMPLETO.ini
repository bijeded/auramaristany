AURA MARISTANY — DESIGN BRIEF COMPLETO
Plataforma web para coach de salud integral, mujeres 40+
===============================================================

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
IDENTIDAD VISUAL (aplica a todas las pantallas)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Tipografía
  - Encabezados y botones: Oswald (bold/semibold)
  - Texto corrido, labels, navegación: Hind (regular/medium)

Paleta de colores
  - Primario:    #eddbd8  (rosa polvoso cálido — fondos suaves, cards)
  - Secundario:  #9982f4  (lavanda — botones de acción, acentos, badges)
  - Negro:       #1a1a1a  (texto principal, navbar oscura)
  - Blanco:      #ffffff  (fondos base, texto sobre oscuros)
  - Gris claro:  #f5f5f5  (fondos alternativos, separadores)
  - Gris texto:  #6b6b6b  (texto secundario, placeholders)
  - Error:       #e05c5c  (mensajes de error, past_due)
  - Éxito:       #4caf7d  (confirmaciones, checks completados)

Estilo general
  - Minimalista, sofisticado, cálido — NO es una app deportiva agresiva
  - Bordes redondeados (border-radius: 12px en cards, 8px en inputs)
  - Sombras sutiles (box-shadow muy suave, no dramático)
  - Fotografía lifestyle de mujeres 40+ activas como elemento visual
  - Espaciado generoso — público 40+, no tech-savvy
  - Botones grandes y legibles (min-height: 48px)
  - Mobile-first: todas las pantallas se usan principalmente en celular

Componentes reutilizables
  - Navbar cliente: logo izquierda + íconos de navegación abajo (mobile bottom tab)
  - Navbar admin: sidebar izquierda con íconos + texto en desktop, hamburger en mobile
  - Badge de estado: "Activa" (verde), "Vencida" (rojo), "Por vencer" (amarillo)
  - Avatar circular con iniciales como fallback
  - Botón primario: fondo #9982f4, texto blanco, Oswald semibold
  - Botón secundario: borde #9982f4, texto #9982f4, fondo transparente
  - Input: borde gris, fondo blanco, label flotante al hacer focus
  - Card: fondo blanco, borde sutil, sombra suave, padding 24px

