<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Maristany · Prototipo</title>
  <link rel="stylesheet" href="aura/styles.css" />
  <style>
    html, body { background: #ece7e6; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- datos (JS plano) -->
  <script src="aura/data.js"></script>

  <!-- librería de UI -->
  <script type="text/babel" src="aura/icons.jsx"></script>
  <script type="text/babel" src="aura/components.jsx"></script>

  <!-- pantallas -->
  <script type="text/babel" src="aura/client-auth.jsx"></script>
  <script type="text/babel" src="aura/client-onboarding.jsx"></script>
  <script type="text/babel" src="aura/client-today.jsx"></script>
  <script type="text/babel" src="aura/client-progress.jsx"></script>
  <script type="text/babel" src="aura/client-messages.jsx"></script>
  <script type="text/babel" src="aura/client-settings.jsx"></script>

  <!-- admin -->
  <script type="text/babel" src="aura/admin-shell.jsx"></script>
  <script type="text/babel" src="aura/admin-dashboard.jsx"></script>
  <script type="text/babel" src="aura/admin-clients.jsx"></script>
  <script type="text/babel" src="aura/admin-content.jsx"></script>
  <script type="text/babel" src="aura/admin-messages.jsx"></script>

  <!-- app (siempre al final) -->
  <script type="text/babel" src="aura/app.jsx"></script>
</body>
</html>
